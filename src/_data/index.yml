hero:
  - Working at the intersection of content, design, and technology, Stephany is a seasoned UX designer and developer.
  - Stephany is passionate about building trust, providing utility, and delivering high engagement experiences centered around users and key performance indicators (KPIs).
  - Stephany is a UX Director at IBM. She holds a master's degree in Web Design and New Media from the Academy of Art University.
  - She also is a distinguished faculty member at General Assembly.


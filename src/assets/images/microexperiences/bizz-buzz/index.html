		.site-header {

		.integer {
			position: relative;
			display: block;
			width: calc(20% - 20px);
			margin-left: 10px;
			margin-right: 10px;
			margin-bottom: 10px;
			line-height: 1;
			border-radius: 50%;
			border: 2px solid #fff;
			text-align: center;
			font-size: 1.10rem;
			color: #fff;
			overflow: hidden;
			font-family: 'Rubik', sans-serif;
			font-weight: 300;
		}

		.integer:after {
			content: '';
			display: block;
			width: 100%;
			height: 0;
			padding-bottom: 100%;
		}

		.integer:before {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			content: attr(data-number);
			display: block;
			opacity: 1;

			-webkit-transition: color 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750), border 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750); 
			-moz-transition: color 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750), border 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750); 
			-o-transition: color 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750), border 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750); 
			transition: color 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750), border 250ms cubic-bezier(0.250, 0.250, 0.750, 0.750);
		}

		@media (min-width: 414px){
			.integer {
				width: calc(15% - 20px);
			}
		}

		@media (min-width: 640px){
			.integer {
				width: calc(10% - 20px);
			}
		}
			
		.integer:hover {
			cursor: pointer;
			color: #F2D657;
			border: 4px solid #F2D657;
		}

		@-webkit-keyframes buzz {
			0% { -webkit-transform: translate(2px, 1px) rotate(0deg); }
			10% { -webkit-transform: translate(-1px, -2px) rotate(-1deg); }
			20% { -webkit-transform: translate(-3px, 0px) rotate(1deg); }
			30% { -webkit-transform: translate(0px, 2px) rotate(0deg); }
			40% { -webkit-transform: translate(1px, -1px) rotate(1deg); }
			50% { -webkit-transform: translate(-1px, 2px) rotate(-1deg); }
			60% { -webkit-transform: translate(-3px, 1px) rotate(0deg); }
			70% { -webkit-transform: translate(2px, 1px) rotate(-1deg); }
			80% { -webkit-transform: translate(-1px, -1px) rotate(1deg); }
			90% { -webkit-transform: translate(2px, 2px) rotate(0deg); }
			100% { -webkit-transform: translate(1px, -2px) rotate(-1deg); }
		}

		.integer.buzz.correct {
			background-color: transparent;
			background-repeat: no-repeat;
			background-position: center center;
			background-size: 100% auto;
			-webkit-animation-name: buzz;
			-webkit-animation-duration: 0.8s;
			-webkit-transform-origin: 50% 50%;
			-webkit-animation-iteration-count: infinite;
			-webkit-animation-timing-function: linear;
			/*text-indent: -999rem;*/
			border: 2px solid transparent;
			pointer-events: none;
		}

		.integer.buzz.correct:before {
			opacity: 0;
		}

		.integer.buzz.correct:nth-child(7n+7) {
			background-image: url(media/happy.svg);
		}

		.integer.buzz.correct:nth-child(17),
		.integer.buzz.correct:nth-child(37),
		.integer.buzz.correct:nth-child(57),
		.integer.buzz.correct:nth-child(77),
		.integer.buzz.correct:nth-child(97) {
			background-image: url(media/hearts.svg);
		}

		.integer.buzz.correct:nth-child(27),
		.integer.buzz.correct:nth-child(47),
		.integer.buzz.correct:nth-child(67),
		.integer.buzz.correct:nth-child(87) {
			background-image: url(media/wink.svg);
		}

	<script src="http://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
	<script>
		$(document).ready(function(){

			// click count
			var clickCount = 0;
			$('.integer').click(function() {
				clickCount++;
				console.log(clickCount +' Click');
			});

			// buzz count
			var buzzCount = 0;
			$('.buzz').not('.correct').click(function(){
				$(this).addClass('correct');
				buzzCount++;
				console.log(buzzCount +' Buzz');
				if (buzzCount == 22){

					$('body').addClass('modal-active modal-won');
				}
				document.getElementById('buzzClickCount').innerHTML = buzzCount;
			});

			// incorrect answer clicked
			$('.integer').not('.buzz').click(function(){
				$('body').addClass('modal-active modal-lost');
			});

			$('.playNow').click(function(){
				$('body').removeClass('modal-active modal-won modal-lost modal-intro');
			});

			$('.playAgain').click(function(){
				$('body').removeClass('modal-active modal-won modal-lost');
				$('.integer').removeClass('correct');
				console.clear();
				clickCount = 0;
				console.log(clickCount +' Click');
				buzzCount = 0;
				console.log(buzzCount +' Buzz');
				document.getElementById('buzzClickCount').innerHTML = buzzCount;
			});

			$('a[rel=external-new-window]').click(function(){
				window.open(this.href, 'myWindowName', 'width=600, height=400');
				return false;
			});
		});
	</script>
